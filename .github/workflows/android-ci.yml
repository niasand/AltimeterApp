name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Release 需要写权限
permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 配置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Gradle Wrapper 容错
      - name: Ensure Gradle Wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.0
          fi
          chmod +x ./gradlew

      # 5. Gradle 缓存
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 6. 解码 Keystore
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.jks
            echo "KEYSTORE_FILE=${{ github.workspace }}/release.jks" >> $GITHUB_ENV
            echo "✅ Keystore decoded"
          else
            echo "⚠️ No KEYSTORE_BASE64 secret, Release will use debug signing"
          fi

      # 7. 编译 Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 8. 编译 Release APK（Gradle 内部签名）
      - name: Build Signed Release APK
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # 9. 生成版本号（基于日期 + 短 SHA）
      - name: Generate version tag
        id: version
        run: |
          VERSION="v1.0.$(date +'%Y%m%d')-${GITHUB_SHA::7}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # 10. 重命名 APK（带版本号）
      - name: Rename APKs
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          cp app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/AltimeterApp-${VERSION}-release.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/AltimeterApp-${VERSION}-debug.apk"

      # 11. 上传 Artifact（保留备份）
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # 12. 创建 GitHub Release（仅 push 到 main 时）
      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## 🏔️ 实时高度表 - ${{ steps.version.outputs.tag }}

            **构建时间**: ${{ steps.version.outputs.date }} UTC
            **Commit**: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### 📦 下载
            - **AltimeterApp-release.apk** — 签名 Release 包，可直接安装
            - **AltimeterApp-debug.apk** — Debug 包，含调试信息

            ### 📝 变更
            ${{ github.event.head_commit.message }}
          files: |
            app/build/outputs/apk/release/AltimeterApp-${{ steps.version.outputs.tag }}-release.apk
            app/build/outputs/apk/debug/AltimeterApp-${{ steps.version.outputs.tag }}-debug.apk
          draft: false
          prerelease: false
          generate_release_notes: false

      # 13. 清理 keystore
      - name: Cleanup keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.jks
